<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Add-on confirmed</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="../assets/files/brand-logo-fist-pen.png" />
  <style>
    :root { --navy: #0d1117; --gold: #c9a84c; --text: #f0f0f0; --muted: #9ca3af; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--navy); color: var(--text); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    main { max-width: 32rem; text-align: center; }
    h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 1rem; color: #fff; }
    p { line-height: 1.6; color: var(--muted); margin: 0 0 1rem; }
    .accent { color: var(--gold); }
    a { color: var(--gold); }
    .btn { display: inline-block; margin-top: 1.25rem; padding: 0.75rem 1.25rem; border-radius: 999px; background: var(--gold); color: var(--navy); font-weight: 600; text-decoration: none; }
    .btn:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <main>
    <h1>Add-on confirmed</h1>
    <p>Thank you — your <span class="accent">order bump</span> is included with this purchase.</p>
    <p>Details and delivery are in the same confirmation email as your main order. Questions? <a href="mailto:hello@amrabutalleb.com">hello@amrabutalleb.com</a></p>
    <a class="btn" href="/ai-designer-blueprint">Back to the blueprint page</a>
  </main>
</body>
</html>
